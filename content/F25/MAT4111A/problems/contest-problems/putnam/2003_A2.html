<blockquote>
  <p>
    Let $a_1, a_2, \dots, a_n$  and  $b_1, b_2, \dots, b_n$ be nonnegative real numbers. Show that
    $$\begin{align*} & (a_1 a_2 \cdots a_n)^{1/n} + (b_1 b_2 \cdots b_n)^{1/n} \\ &\leq \big((a_1+b_1) (a_2+b_2) \cdots (a_n + b_n)\big)^{1/n}. \end{align*}$$
  </p>
  <cite>
    2003 Putnam Exam, <a href="https://kskedlaya.org/putnam-archive/2003.pdf">Problem A2</a>
  </cite>
</blockquote>
