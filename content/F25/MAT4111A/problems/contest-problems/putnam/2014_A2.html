<blockquote>
  <p>
    Let $A$ be the $n \times n$ matrix whose entry in the $i$-th row and $j$-th column is \[ a_ij = \frac{1}{\min(i,j)} \] for $1 \leq i,j \leq n$.
    Compute $\det(A)$.
  </p>
  <cite>
    2014 Putnam Exam, <a href="https://kskedlaya.org/putnam-archive/2014.pdf">Problem A2</a>
  </cite>
</blockquote>
